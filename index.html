<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Gastos e Ingresos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .app { max-width: 680px; margin: 0 auto; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
  .app-title { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .app-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .month-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { padding: 6px 16px; border-radius: 20px; border: 1px solid #d0d0cc; background: transparent; font-size: 13px; color: #666; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #efefec; border-radius: 10px; padding: 1rem; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .metric-value.income { color: #1a7a4a; }
  .metric-value.expense { color: #b03030; }
  .metric-value.pos { color: #1a7a4a; }
  .metric-value.neg { color: #b03030; }

  .section { background: #fff; border: 1px solid #e8e8e5; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }

  /* Week rows */
  .week-block { padding: 12px 0; border-bottom: 1px solid #f0f0ed; }
  .week-block:last-child { border-bottom: none; }
  .week-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .week-label { font-size: 13px; color: #888; min-width: 75px; }

  .days-stepper { display: flex; align-items: center; gap: 6px; }
  .step-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #d0d0cc; background: transparent; font-size: 17px; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.12s; font-family: inherit; }
  .step-btn:hover { background: #f0f0ed; }
  .days-val { width: 28px; text-align: center; font-size: 16px; font-weight: 600; color: #1a1a1a; }

  .week-income { font-size: 13px; font-weight: 600; color: #1a7a4a; }

  /* Pasaje days grid */
  .pasaje-section { background: #f9f9f7; border-radius: 10px; padding: 10px 12px; }
  .pasaje-section-label { font-size: 11px; color: #aaa; margin-bottom: 8px; letter-spacing: 0.04em; }
  .days-grid { display: flex; flex-direction: column; gap: 6px; }
  .day-pasaje-row { display: grid; grid-template-columns: 55px 1fr; align-items: center; gap: 8px; }
  .day-name { font-size: 12px; color: #888; }
  .pasaje-options { display: flex; gap: 5px; flex-wrap: wrap; }
  .pasaje-pill { padding: 4px 10px; border-radius: 20px; border: 1px solid #d0d0cc; background: transparent; font-size: 12px; color: #666; cursor: pointer; transition: all 0.12s; font-family: inherit; white-space: nowrap; }
  .pasaje-pill:hover { background: #efefec; }
  .pasaje-pill.sel-normal { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .pasaje-pill.sel-transmi { background: #1a5c8a; color: #fff; border-color: #1a5c8a; }
  .pasaje-pill.sel-gratis { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }
  .pasaje-pill.sel-otro { background: #7a4a1a; color: #fff; border-color: #7a4a1a; }
  .pasaje-pill.sel-moto { background: #6a1a7a; color: #fff; border-color: #6a1a7a; }

  .week-pasaje-total { font-size: 12px; color: #b03030; text-align: right; margin-top: 6px; }

  /* Expenses */
  .expense-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0ed; }
  .expense-row:last-child { border-bottom: none; }
  .expense-name { font-size: 14px; color: #1a1a1a; outline: none; border-radius: 4px; padding: 2px 4px; }
  .expense-name:focus { background: #f5f5f3; }
  .expense-input { width: 140px; padding: 7px 12px; border-radius: 8px; border: 1px solid #d0d0cc; background: #f5f5f3; font-size: 13px; color: #1a1a1a; text-align: right; font-family: inherit; }
  .expense-input:focus { outline: none; border-color: #999; background: #fff; }
  .add-btn { width: 100%; margin-top: 10px; padding: 9px; border-radius: 8px; border: 1px dashed #d0d0cc; background: transparent; font-size: 13px; color: #999; cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .add-btn:hover { background: #f5f5f3; color: #666; }

  .progress-bar-wrap { height: 6px; background: #efefec; border-radius: 999px; margin-top: 1.5rem; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 999px; transition: width 0.4s ease, background 0.3s; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #999; margin-top: 6px; }

  @media (max-width: 500px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .pasaje-options { gap: 4px; }
    .pasaje-pill { font-size: 11px; padding: 3px 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div>
      <div class="app-title">Control de gastos</div>
      <div class="app-sub">2025</div>
    </div>
    <div class="month-tabs" id="monthTabs"></div>
  </div>

  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Ingresos</div><div class="metric-value income" id="sumIncome">$0</div></div>
    <div class="metric"><div class="metric-label">Gastos</div><div class="metric-value expense" id="sumExpense">$0</div></div>
    <div class="metric"><div class="metric-label">Saldo disponible</div><div class="metric-value" id="sumBalance">$0</div></div>
  </div>

  <div class="section">
    <div class="section-title">Semanas — días trabajados y pasajes</div>
    <div id="weeksContainer"></div>
  </div>

  <div class="section">
    <div class="section-title">Gastos variables</div>
    <div id="expensesContainer"></div>
    <button class="add-btn" onclick="addExpense()">+ Agregar gasto</button>
  </div>

  <div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label"><span>Gastos vs ingresos</span><span id="progressPct">0%</span></div>
  </div>
</div>

<script>
const MONTHS = ["Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const PAY = 50000;

const PASAJE_TIPOS = [
  { id: "transmi", label: "Transmilenio $3.700", cost: 3700,  cls: "sel-transmi" },
  { id: "moto",    label: "Moto $7.000",         cost: 7000,  cls: "sel-moto" },
  { id: "gratis",  label: "Me ahorré",           cost: 0,     cls: "sel-gratis" },
];

const DAY_NAMES = ["Día 1","Día 2","Día 3","Día 4","Día 5","Día 6","Día 7"];

function makeDefaultWeek(days) {
  return {
    days: days,
    pasajes: Array(days).fill("normal")
  };
}

const state = MONTHS.map(() => ({
  weeks: [
    makeDefaultWeek(4),
    makeDefaultWeek(4),
    makeDefaultWeek(4),
    makeDefaultWeek(4)
  ],
  expenses: [
    { name: "Salidas con novia", value: 0 },
    { name: "Gastos imprevistos", value: 0 }
  ]
}));

let currentMonth = 0;

function fmt(n) {
  return "$" + Math.round(n).toLocaleString("es-CO");
}

function weekPasajeCost(week) {
  return week.pasajes.reduce((s, tipo) => {
    const t = PASAJE_TIPOS.find(p => p.id === tipo);
    return s + (t ? t.cost : 0);
  }, 0);
}

function renderTabs() {
  const c = document.getElementById("monthTabs");
  c.innerHTML = "";
  MONTHS.forEach((m, i) => {
    const b = document.createElement("button");
    b.className = "tab" + (i === currentMonth ? " active" : "");
    b.textContent = m;
    b.onclick = () => { currentMonth = i; render(); };
    c.appendChild(b);
  });
}

function renderWeeks() {
  const c = document.getElementById("weeksContainer");
  c.innerHTML = "";

  state[currentMonth].weeks.forEach((week, wi) => {
    const income = week.days * PAY;
    const pasajeCost = weekPasajeCost(week);

    const block = document.createElement("div");
    block.className = "week-block";

    // Top row: label + stepper + income
    const top = document.createElement("div");
    top.className = "week-top";

    const label = document.createElement("div");
    label.className = "week-label";
    label.textContent = "Semana " + (wi + 1);

    const stepper = document.createElement("div");
    stepper.className = "days-stepper";

    const minus = document.createElement("button");
    minus.className = "step-btn";
    minus.innerHTML = "&#8722;";
    minus.onclick = () => {
      const w = state[currentMonth].weeks[wi];
      if (w.days > 1) {
        w.days--;
        w.pasajes = w.pasajes.slice(0, w.days);
        render();
      }
    };

    const daysVal = document.createElement("div");
    daysVal.className = "days-val";
    daysVal.textContent = week.days;

    const plus = document.createElement("button");
    plus.className = "step-btn";
    plus.innerHTML = "&#43;";
    plus.onclick = () => {
      const w = state[currentMonth].weeks[wi];
      if (w.days < 7) {
        w.days++;
        w.pasajes.push("normal");
        render();
      }
    };

    stepper.appendChild(minus);
    stepper.appendChild(daysVal);
    stepper.appendChild(plus);

    const incEl = document.createElement("div");
    incEl.className = "week-income";
    incEl.textContent = fmt(income);

    top.appendChild(label);
    top.appendChild(stepper);
    top.appendChild(incEl);
    block.appendChild(top);

    // Pasaje section
    const pasajeSection = document.createElement("div");
    pasajeSection.className = "pasaje-section";

    const pasajeSectionLabel = document.createElement("div");
    pasajeSectionLabel.className = "pasaje-section-label";
    pasajeSectionLabel.textContent = "Tipo de pasaje por día";
    pasajeSection.appendChild(pasajeSectionLabel);

    const grid = document.createElement("div");
    grid.className = "days-grid";

    week.pasajes.forEach((tipo, di) => {
      const dayRow = document.createElement("div");
      dayRow.className = "day-pasaje-row";

      const dayName = document.createElement("div");
      dayName.className = "day-name";
      dayName.textContent = DAY_NAMES[di];

      const pills = document.createElement("div");
      pills.className = "pasaje-options";

      PASAJE_TIPOS.forEach(t => {
        const pill = document.createElement("button");
        pill.className = "pasaje-pill" + (tipo === t.id ? " " + t.cls : "");
        pill.textContent = t.label;
        pill.onclick = () => {
          state[currentMonth].weeks[wi].pasajes[di] = t.id;
          render();
        };
        pills.appendChild(pill);
      });

      dayRow.appendChild(dayName);
      dayRow.appendChild(pills);
      grid.appendChild(dayRow);
    });

    pasajeSection.appendChild(grid);

    // Pasaje total for week
    const pasajeTotal = document.createElement("div");
    pasajeTotal.className = "week-pasaje-total";
    pasajeTotal.textContent = "Pasajes semana: " + fmt(pasajeCost);
    pasajeSection.appendChild(pasajeTotal);

    block.appendChild(pasajeSection);
    c.appendChild(block);
  });
}

function renderExpenses() {
  const c = document.getElementById("expensesContainer");
  c.innerHTML = "";
  state[currentMonth].expenses.forEach((exp, ei) => {
    const row = document.createElement("div");
    row.className = "expense-row";

    const name = document.createElement("div");
    name.className = "expense-name";
    name.contentEditable = true;
    name.textContent = exp.name;
    name.onblur = () => { state[currentMonth].expenses[ei].name = name.textContent; };

    const inp = document.createElement("input");
    inp.type = "number";
    inp.className = "expense-input";
    inp.value = exp.value || "";
    inp.placeholder = "$0";
    inp.min = 0;
    inp.oninput = () => {
      state[currentMonth].expenses[ei].value = parseFloat(inp.value) || 0;
      updateSummary();
    };

    row.appendChild(name);
    row.appendChild(inp);
    c.appendChild(row);
  });
}

function addExpense() {
  state[currentMonth].expenses.push({ name: "Nuevo gasto", value: 0 });
  renderExpenses();
  updateSummary();
}

function updateSummary() {
  const weeks = state[currentMonth].weeks;
  const totalIncome = weeks.reduce((s, w) => s + w.days * PAY, 0);
  const totalPasajes = weeks.reduce((s, w) => s + weekPasajeCost(w), 0);
  const totalVar = state[currentMonth].expenses.reduce((s, e) => s + (e.value || 0), 0);
  const totalExpense = totalPasajes + totalVar;
  const balance = totalIncome - totalExpense;
  const pct = totalIncome > 0 ? Math.min(100, Math.round(totalExpense / totalIncome * 100)) : 0;

  document.getElementById("sumIncome").textContent = fmt(totalIncome);
  document.getElementById("sumExpense").textContent = fmt(totalExpense);
  const balEl = document.getElementById("sumBalance");
  balEl.textContent = fmt(balance);
  balEl.className = "metric-value " + (balance >= 0 ? "pos" : "neg");

  const bar = document.getElementById("progressBar");
  bar.style.width = pct + "%";
  bar.style.background = pct > 90 ? "#b03030" : pct > 60 ? "#c17a10" : "#1a7a4a";
  document.getElementById("progressPct").textContent = pct + "%";
}

function render() {
  renderTabs();
  renderWeeks();
  renderExpenses();
  updateSummary();
}

render();
</script>
</body>
</html>
